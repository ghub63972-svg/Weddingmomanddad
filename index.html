<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy 17th Anniversary Mom & Dad 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
/* =============================================
   ROOT VARIABLES & RESET
   ============================================= */
:root {
  --pink: #ff6b9d;
  --rose: #ff4d7d;
  --red: #e8194b;
  --gold: #ffd700;
  --gold-light: #ffe066;
  --purple: #c084fc;
  --deep-purple: #7c3aed;
  --white: #fff8f8;
  --cream: #fff0f3;
  --dark: #1a0a10;
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.18);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a10;font-family:'Cormorant Garamond',serif;cursor:none;}
body{position:relative;}

/* =============================================
   CUSTOM CURSOR
   ============================================= */
#cursor{position:fixed;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#ff6b9d,#ffd700);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform .1s;mix-blend-mode:screen;filter:blur(1px);}
#cursor-trail{position:fixed;width:8px;height:8px;border-radius:50%;background:#ff6b9d44;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:left .15s ease,top .15s ease;}

/* =============================================
   LOADING SCREEN
   ============================================= */
#loading-screen{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,#2d0a1f 0%,#1a0a10 60%,#0d0508 100%);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s ease;}
.loading-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2.8rem);color:#fff;text-align:center;letter-spacing:0.1em;animation:glowPulse 2s infinite alternate;line-height:1.4;}
.loading-sub{font-family:'Dancing Script',cursive;font-size:clamp(1rem,3vw,1.6rem);color:#ff6b9d;margin-top:1rem;animation:fadeInUp 1s ease .5s both;}
.loading-bar-wrap{width:min(300px,70vw);height:4px;background:rgba(255,255,255,0.1);border-radius:4px;margin-top:2.5rem;overflow:hidden;}
.loading-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff6b9d,#ffd700,#c084fc);border-radius:4px;animation:loadBar 3s ease forwards;}
@keyframes loadBar{to{width:100%;}}
@keyframes glowPulse{from{text-shadow:0 0 10px #ff6b9d,0 0 30px #ff6b9d44;}to{text-shadow:0 0 20px #ffd700,0 0 60px #ff6b9daa,0 0 100px #c084fc44;}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* =============================================
   WELCOME POPUP
   ============================================= */
#welcome-popup{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:8000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
#welcome-popup.show{display:flex;}
.popup-card{background:linear-gradient(135deg,rgba(45,10,31,0.95),rgba(26,10,16,0.98));border:1.5px solid rgba(255,215,0,0.3);border-radius:24px;padding:clamp(2rem,5vw,3.5rem);max-width:min(560px,90vw);text-align:center;box-shadow:0 0 60px #ff6b9d44,0 0 120px #ffd70022,inset 0 0 60px rgba(255,107,157,0.03);animation:popupIn .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes popupIn{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
.popup-emoji{font-size:clamp(2rem,6vw,4rem);animation:heartBeat 1.5s ease infinite;}
@keyframes heartBeat{0%,100%{transform:scale(1);}14%{transform:scale(1.15);}28%{transform:scale(1);}42%{transform:scale(1.1);}70%{transform:scale(1);}}
.popup-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4.5vw,2.8rem);background:linear-gradient(135deg,#ffd700,#ff6b9d,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:.6rem 0;line-height:1.2;}
.popup-names{font-family:'Dancing Script',cursive;font-size:clamp(1.2rem,3.5vw,2rem);color:#ff6b9d;margin-bottom:1.2rem;}
.popup-msg{font-size:clamp(.9rem,2.5vw,1.1rem);color:rgba(255,240,243,0.8);line-height:1.8;font-style:italic;}
.btn-start{margin-top:2rem;padding:1rem 2.5rem;background:linear-gradient(135deg,#ff4d7d,#c084fc);border:none;border-radius:50px;color:#fff;font-family:'Playfair Display',serif;font-size:clamp(.95rem,2.5vw,1.2rem);letter-spacing:.08em;cursor:pointer;box-shadow:0 4px 30px #ff6b9d88;transition:all .3s ease;position:relative;overflow:hidden;}
.btn-start:hover{transform:scale(1.06);box-shadow:0 6px 50px #ff6b9dcc,0 0 30px #ffd70066;}
.btn-start::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,0.15),transparent);transform:translateX(-100%);transition:transform .5s;}
.btn-start:hover::after{transform:translateX(100%);}

/* =============================================
   MAIN BACKGROUND
   ============================================= */
#main-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,#3d0a24 0%,#1a0a10 40%,#0d0508 80%,#1a0010 100%);z-index:0;}
#particles-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
#main-screen{position:fixed;inset:0;z-index:10;overflow-y:auto;overflow-x:hidden;display:none;}
#main-screen.show{display:block;}

/* =============================================
   FLOATING ELEMENTS
   ============================================= */
.float-heart{position:fixed;pointer-events:none;font-size:clamp(1rem,2.5vw,1.8rem);animation:floatUp linear infinite;opacity:0;z-index:2;}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:.7;}90%{opacity:.4;}100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}}
.balloon{position:fixed;pointer-events:none;font-size:clamp(1.5rem,3vw,2.5rem);animation:balloonFloat ease-in-out infinite;z-index:2;opacity:0.7;}
@keyframes balloonFloat{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-30px) rotate(3deg);}}

/* =============================================
   HERO SECTION
   ============================================= */
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;z-index:10;}
.hero-tag{font-family:'Dancing Script',cursive;font-size:clamp(1rem,2.5vw,1.5rem);color:#ffd700;letter-spacing:.15em;margin-bottom:1rem;animation:fadeInUp .8s ease both;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,5rem);color:#fff8f8;line-height:1.15;margin-bottom:1rem;animation:fadeInUp .8s ease .2s both;}
.hero-title span{background:linear-gradient(135deg,#ff6b9d,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-typing{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,2.8vw,1.8rem);color:rgba(255,240,243,0.8);min-height:2.5rem;animation:fadeInUp .8s ease .4s both;}
.typing-cursor{display:inline-block;animation:blink .7s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.hero-hearts{font-size:2rem;margin-top:1.5rem;animation:fadeInUp .8s ease .6s both;}
.scroll-hint{position:absolute;bottom:2rem;font-family:'Dancing Script',cursive;font-size:1rem;color:rgba(255,107,157,0.6);animation:bounce 2s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(8px);}}

/* =============================================
   SECTION WRAPPER
   ============================================= */
.section{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;position:relative;z-index:10;}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4.5vw,3.5rem);text-align:center;margin-bottom:.5rem;}
.section-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2.5vw,1.4rem);color:rgba(255,240,243,0.65);text-align:center;font-style:italic;margin-bottom:2.5rem;}
.glass-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;backdrop-filter:blur(12px);padding:clamp(1.5rem,4vw,2.5rem);box-shadow:0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.1);}

/* =============================================
   CAKE SECTION
   ============================================= */
#cake-section{background:radial-gradient(ellipse at 50% 80%,rgba(255,107,157,0.08) 0%,transparent 60%);}
.cake-wrap{position:relative;display:flex;flex-direction:column;align-items:center;}
.cake-svg-wrap{position:relative;width:min(280px,70vw);filter:drop-shadow(0 0 30px rgba(255,107,157,0.5));}
.candles-row{display:flex;gap:6px;justify-content:center;margin-bottom:4px;}
.candle{display:flex;flex-direction:column;align-items:center;}
.candle-body{width:6px;height:22px;background:linear-gradient(180deg,#fff8e1,#ffecb3);border-radius:3px 3px 1px 1px;}
.flame{width:10px;height:16px;background:radial-gradient(ellipse at 50% 80%,#ff4500,#ff8c00,#ffd700,transparent);border-radius:50% 50% 40% 40%;margin-bottom:1px;animation:flicker .3s ease-in-out infinite alternate;transform-origin:50% 100%;filter:blur(.5px);}
.flame.out{opacity:0;transition:opacity .5s;}
@keyframes flicker{0%{transform:scaleX(.9) scaleY(1);filter:blur(.5px);}100%{transform:scaleX(1.1) scaleY(.95) rotate(3deg);filter:blur(.8px);}}
.cake-body{width:min(260px,65vw);text-align:center;}
.cake-tier{background:linear-gradient(180deg,#ff6b9d,#e8194b);border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Dancing Script',cursive;font-size:clamp(.8rem,2vw,1.1rem);padding:.4rem;border-bottom:3px solid rgba(255,255,255,0.3);}
.cake-tier.t1{height:55px;font-size:clamp(1rem,2.5vw,1.3rem);}
.cake-tier.t2{height:70px;background:linear-gradient(180deg,#e8194b,#c0134a);border-radius:0;}
.cake-tier.t3{height:85px;background:linear-gradient(180deg,#c0134a,#8b0038);border-radius:0 0 20px 20px;}
.cake-plate{width:min(300px,75vw);height:18px;background:linear-gradient(180deg,#fff8e1,#ffe082);border-radius:50%;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.cake-sparkles{position:absolute;width:100%;height:100%;pointer-events:none;top:0;left:0;}
.sparkle{position:absolute;width:6px;height:6px;background:#ffd700;border-radius:50%;animation:sparklePop 1.5s ease-in-out infinite;}
@keyframes sparklePop{0%,100%{transform:scale(0);opacity:0;}50%{transform:scale(1);opacity:1;}}
.btn-blow{margin-top:2rem;padding:1rem 2.8rem;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;border-radius:50px;color:#1a0a10;font-family:'Playfair Display',serif;font-size:clamp(1rem,2.5vw,1.2rem);font-weight:700;cursor:pointer;box-shadow:0 4px 30px #ffd70066;transition:all .3s;letter-spacing:.05em;}
.btn-blow:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 8px 50px #ffd700aa;}
.btn-blow:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* =============================================
   CELEBRATION OVERLAY
   ============================================= */
#celebration-overlay{position:fixed;inset:0;z-index:500;pointer-events:none;display:none;}
#celebration-overlay.show{display:block;}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
#fireworks-canvas{position:fixed;inset:0;z-index:501;pointer-events:none;display:none;}

/* =============================================
   POINTS SECTION
   ============================================= */
#points-section{background:radial-gradient(ellipse at 50% 20%,rgba(192,132,252,0.1) 0%,transparent 60%);}
.points-display{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,4rem);background:linear-gradient(135deg,#ffd700,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin:1rem 0;}
.progress-wrap{width:min(400px,85vw);height:20px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.15);box-shadow:inset 0 2px 4px rgba(0,0,0,0.3);}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff6b9d,#ffd700,#c084fc);border-radius:10px;transition:width .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 15px rgba(255,215,0,0.5);}
.activities-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(140px,38vw),1fr));gap:1rem;max-width:700px;margin:2rem auto 0;width:100%;}
.activity-btn{padding:1.2rem 1rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;color:#fff;font-family:'Cormorant Garamond',serif;font-size:clamp(.85rem,2.2vw,1rem);cursor:pointer;transition:all .3s;text-align:center;backdrop-filter:blur(8px);}
.activity-btn:hover{background:rgba(255,107,157,0.15);border-color:rgba(255,107,157,0.4);transform:translateY(-3px);box-shadow:0 8px 30px rgba(255,107,157,0.2);}
.activity-btn .act-icon{font-size:2rem;display:block;margin-bottom:.5rem;}
.activity-btn.completed{border-color:#ffd70066;background:rgba(255,215,0,0.08);}

/* =============================================
   GAME OVERLAYS
   ============================================= */
.game-overlay{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;overflow:hidden;background:radial-gradient(ellipse at 50% 50%,rgba(26,10,16,0.97),rgba(13,5,8,0.99));}
.game-overlay.show{display:flex;}
.game-header{padding:1.5rem;text-align:center;z-index:10;width:100%;}
.game-header h2{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2.2rem);background:linear-gradient(135deg,#ffd700,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.game-score{font-family:'Dancing Script',cursive;font-size:1.3rem;color:#ffd700;margin-top:.3rem;}
.game-area{flex:1;width:100%;position:relative;overflow:hidden;}
.btn-close-game{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50%;width:40px;height:40px;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;transition:all .3s;}
.btn-close-game:hover{background:rgba(255,107,157,0.3);}

/* POP BALLOONS game */
.game-balloon{position:absolute;font-size:clamp(2rem,5vw,3.5rem);cursor:pointer;transition:transform .1s;user-select:none;animation:gameBalloonFloat ease-in-out infinite alternate;filter:drop-shadow(0 0 6px rgba(255,107,157,0.6));}
.game-balloon:hover{transform:scale(1.1);}
@keyframes gameBalloonFloat{0%{transform:translateY(0);}100%{transform:translateY(-18px);}}
.pop-anim{position:absolute;pointer-events:none;font-size:2rem;animation:popOut .5s ease forwards;}
@keyframes popOut{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(2.5);}}

/* CATCH HEARTS game */
.fall-heart{position:absolute;font-size:clamp(1.5rem,4vw,2.5rem);cursor:pointer;animation:heartFall linear forwards;user-select:none;}
@keyframes heartFall{0%{transform:translateY(0) rotate(0deg);}100%{transform:translateY(110vh) rotate(360deg);}}
.combo-text{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Dancing Script',cursive;font-size:2.5rem;color:#ffd700;pointer-events:none;z-index:9999;animation:comboAnim .8s ease forwards;}
@keyframes comboAnim{0%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-80%) scale(1.5);}}

/* SPIN WHEEL */
#wheel-canvas{border-radius:50%;box-shadow:0 0 40px #ffd70066,0 0 80px #ff6b9d44;cursor:pointer;max-width:min(320px,80vw);max-height:min(320px,80vw);}
.wheel-pointer{font-size:2rem;text-align:center;color:#ffd700;filter:drop-shadow(0 0 10px #ffd700);}
.btn-spin{padding:.9rem 2.5rem;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;border-radius:50px;color:#1a0a10;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 25px #ffd70055;transition:all .3s;margin-top:1rem;}
.btn-spin:disabled{opacity:.5;cursor:not-allowed;}
.btn-spin:not(:disabled):hover{transform:scale(1.05);box-shadow:0 6px 40px #ffd700aa;}

/* HIDDEN HEARTS game */
.hidden-heart{position:absolute;font-size:clamp(1.2rem,3vw,2rem);cursor:pointer;animation:hiddenPulse 2s ease-in-out infinite;user-select:none;filter:drop-shadow(0 0 8px rgba(255,107,157,0.8));}
@keyframes hiddenPulse{0%,100%{opacity:.3;transform:scale(.9);}50%{opacity:.8;transform:scale(1.05);}}

/* BUBBLES game */
.love-bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.4),rgba(255,107,157,0.2),rgba(192,132,252,0.15));border:2px solid rgba(255,255,255,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;animation:bubbleDrift ease-in-out infinite alternate;box-shadow:0 0 15px rgba(255,107,157,0.3);user-select:none;}
@keyframes bubbleDrift{0%{transform:translate(0,0) rotate(-3deg);}100%{transform:translate(20px,-15px) rotate(3deg);}}
.bubble-burst{position:absolute;pointer-events:none;animation:burstAnim .6s ease forwards;}
@keyframes burstAnim{0%{opacity:1;transform:scale(0);}50%{opacity:.8;transform:scale(1.8);}100%{opacity:0;transform:scale(2.5);}}

/* =============================================
   UNLOCK SECTION
   ============================================= */
#unlock-section{background:radial-gradient(ellipse at 50% 50%,rgba(255,215,0,0.08) 0%,transparent 60%);display:none;}
#unlock-section.show{display:flex;}
.unlock-anim{text-align:center;animation:unlockReveal 1s ease both;}
@keyframes unlockReveal{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
.photo-frame{position:relative;display:inline-block;margin:2rem 0;}
.photo-frame img{width:min(320px,75vw);height:min(320px,75vw);object-fit:cover;border-radius:16px;border:4px solid transparent;background:linear-gradient(#1a0a10,#1a0a10) padding-box,linear-gradient(135deg,#ffd700,#ff6b9d,#ffd700) border-box;box-shadow:0 0 40px #ffd70066,0 0 80px #ff6b9d44,0 0 120px #ffd70022;}
.photo-hearts{position:absolute;inset:-20px;pointer-events:none;}
.photo-heart{position:absolute;font-size:1.2rem;animation:floatAround linear infinite;}
@keyframes floatAround{0%{transform:rotate(0deg) translateX(120px) rotate(0deg);}100%{transform:rotate(360deg) translateX(120px) rotate(-360deg);}}
.unlock-msg{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,3.5vw,2rem);background:linear-gradient(135deg,#ffd700,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin:1rem 0;line-height:1.5;}

/* =============================================
   FINAL SECTION
   ============================================= */
#final-section{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1.5rem;position:relative;z-index:10;}
.final-title{font-family:'Dancing Script',cursive;font-size:clamp(2.5rem,7vw,5rem);background:linear-gradient(135deg,#ffd700,#ff6b9d,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glowPulse 2s infinite alternate;margin-bottom:1rem;}
.signature{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1rem,3vw,1.8rem);color:rgba(255,240,243,0.6);margin-top:2rem;letter-spacing:.1em;}
.signature span{color:#ffd700;animation:glowPulse 2s infinite alternate;}
.falling-rose{position:fixed;font-size:1.5rem;pointer-events:none;animation:roseFall linear forwards;z-index:5;}
@keyframes roseFall{0%{transform:translateY(-5vh) rotate(0deg);opacity:1;}100%
